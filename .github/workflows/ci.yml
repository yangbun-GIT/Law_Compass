name: LawCompass CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:display
      - run: npm run test:chat

  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/gateway/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  worker:
    name: Worker Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests
      - run: python -m compileall worker tests

  agent:
    name: Agent Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    env:
      PYTHONPATH: "."
      LAWCOMPASS_REGRESSION_USE_LLM: "0"
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/agent/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app scripts tests
      - run: python -m unittest tests.test_knia_cache_fallback
      - run: python scripts/check_internal_routes.py
      - run: python scripts/test_agent_regression_scenarios.py
